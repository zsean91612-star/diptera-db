<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣雙翅目觀察資料庫</title>
<style>
  :root {
    --bg: #f3f7fa;
    --card-bg: #ffffff;
    --accent: #2f6f8f;
    --accent-light: #e6f0f5;
    --accent2: #1f4f66;
    --text: #1a2e38;
    --muted: #5a7686;
    --border: #c5d7e0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Noto Sans TC", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--accent);
    color: white;
    padding: 1.2rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
  }
  header h1 { font-size: 1.2rem; font-weight: 700; }
  header .subtitle { font-size: .8rem; opacity: .85; }
  .header-nav { display: flex; gap: .6rem; margin-left: auto; flex-wrap: wrap; }
  .header-nav a {
    color: rgba(255,255,255,.8); text-decoration: none;
    font-size: .82rem; padding: .2rem .65rem;
    border-radius: 999px; border: 1px solid rgba(255,255,255,.35);
  }
  .header-nav a:hover, .header-nav a.active {
    background: rgba(255,255,255,.2); color: white;
  }
  #total-badge {
    background: rgba(255,255,255,.2);
    border-radius: 999px;
    padding: .2rem .8rem;
    font-size: .85rem;
  }

  /* ── Layout ── */
  .layout { display: flex; gap: 0; }

  /* ── Sidebar / Filters ── */
  aside {
    width: 250px;
    min-width: 250px;
    background: var(--card-bg);
    border-right: 1px solid var(--border);
    padding: 1.2rem;
    height: calc(100vh - 60px);
    overflow-y: auto;
    position: sticky;
    top: 60px;
  }
  aside h2 {
    font-size: .75rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    margin-bottom: .6rem;
  }
  #search {
    width: 100%;
    padding: .5rem .7rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: .9rem;
    margin-bottom: 1.2rem;
    outline: none;
  }
  #search:focus { border-color: var(--accent); }

  /* Category filter tabs */
  .cat-list { list-style: none; margin-bottom: 1.4rem; }
  .cat-list li {
    padding: .3rem .5rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: .88rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .cat-list li:hover { background: var(--accent-light); }
  .cat-list li.active { background: var(--accent); color: white; }
  .cat-list li .count {
    font-size: .75rem;
    opacity: .7;
    background: rgba(0,0,0,.08);
    border-radius: 999px;
    padding: .05rem .45rem;
  }
  .cat-list li.active .count { background: rgba(255,255,255,.2); }

  /* Toggle family groups */
  .family-group { margin-bottom: .3rem; }
  .family-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: .35rem .5rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: .85rem;
    font-weight: 600;
    color: var(--accent2);
    user-select: none;
    border: 1px solid transparent;
  }
  .family-header:hover { background: var(--accent-light); }
  .family-header.has-active { border-color: var(--accent); background: var(--accent-light); }
  .family-arrow {
    font-size: .65rem;
    transition: transform .2s;
    color: var(--muted);
  }
  .family-group.open .family-arrow { transform: rotate(90deg); }
  .family-count {
    font-size: .72rem;
    color: var(--muted);
    background: rgba(0,0,0,.06);
    border-radius: 999px;
    padding: .05rem .4rem;
    margin-left: auto;
    margin-right: .3rem;
  }
  .family-body { display: none; padding-left: .5rem; }
  .family-group.open .family-body { display: block; }
  .species-item {
    padding: .25rem .5rem;
    border-radius: 5px;
    cursor: pointer;
    font-size: .82rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .species-item:hover { background: var(--accent-light); }
  .species-item.active { background: var(--accent); color: white; }
  .species-item .count {
    font-size: .72rem;
    opacity: .7;
    background: rgba(0,0,0,.08);
    border-radius: 999px;
    padding: .05rem .4rem;
  }
  .species-item.active .count { background: rgba(255,255,255,.2); }

  /* ── Main grid ── */
  main {
    flex: 1;
    padding: 1.2rem;
    overflow-y: auto;
  }
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
  }
  .card {
    background: var(--card-bg);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    border: 1px solid var(--border);
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,.12); }
  .card-img {
    width: 100%;
    aspect-ratio: 4/3;
    object-fit: cover;
    background: var(--accent-light);
    display: block;
  }
  .card-no-img {
    width: 100%;
    aspect-ratio: 4/3;
    background: linear-gradient(135deg, #e8f5ef, #b2dfdb);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
  }
  .card-body { padding: .75rem; }
  .card-species {
    font-weight: 600;
    font-size: .9rem;
    color: var(--accent);
    margin-bottom: .2rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-scientific {
    font-size: .72rem;
    color: var(--muted);
    font-style: italic;
    margin-bottom: .15rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-family {
    font-size: .75rem;
    color: var(--muted);
    margin-bottom: .2rem;
  }
  .card-location {
    font-size: .8rem;
    color: var(--muted);
    margin-bottom: .35rem;
  }
  .card-location::before { content: "📍 "; }
  .card-text {
    font-size: .8rem;
    line-height: 1.4;
    color: #555;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-meta {
    margin-top: .5rem;
    font-size: .72rem;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }
  #empty {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--muted);
    display: none;
  }
  #empty .icon { font-size: 3rem; margin-bottom: .5rem; }

  /* ── Modal ── */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.65);
    z-index: 200;
    justify-content: center;
    align-items: flex-start;
    padding: 2rem 1rem;
    overflow-y: auto;
  }
  #modal-overlay.open { display: flex; }
  #modal {
    background: var(--card-bg);
    border-radius: 12px;
    max-width: 700px;
    width: 100%;
    overflow: hidden;
    position: relative;
  }
  #modal-close {
    position: absolute; top: .75rem; right: .75rem;
    background: rgba(0,0,0,.5); color: white;
    border: none; border-radius: 50%; width: 28px; height: 28px;
    font-size: 1rem; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    z-index: 1;
  }
  #modal-imgs {
    display: flex; flex-wrap: wrap; gap: .5rem;
    padding: .75rem; background: #111; max-height: 60vh; overflow-y: auto;
  }
  #modal-imgs img {
    max-height: 300px; max-width: 100%; border-radius: 6px; cursor: zoom-in;
  }
  #modal-body { padding: 1.2rem; }
  #modal-species { font-size: 1.2rem; font-weight: 700; color: var(--accent); margin-bottom: .15rem; }
  #modal-scientific { font-size: .9rem; color: var(--muted); font-style: italic; margin-bottom: .4rem; }
  #modal-meta { font-size: .85rem; color: var(--muted); margin-bottom: .8rem; }
  #modal-text { font-size: .9rem; line-height: 1.6; white-space: pre-wrap; margin-bottom: 1rem; }
  #modal-link {
    display: inline-block;
    background: var(--accent); color: white;
    text-decoration: none; padding: .45rem 1.1rem;
    border-radius: 8px; font-size: .85rem;
  }
  #modal-link:hover { background: var(--accent2); }

  @media (max-width: 700px) {
    aside { display: none; }
    .layout { display: block; }
  }
</style>
</head>

// ── State ──
let activeCategory = "all";
let activeSpecies  = null;
let activeFamily   = null;
let searchQuery    = "";

// ── Category counts ──
function getCategoryCounts() {
  const counts = { all: 0 };
  for (const p of POSTS) {
    counts.all++;
    const cat = p.category || "other";
    counts[cat] = (counts[cat] || 0) + 1;
  }
  return counts;
}

const CAT_LABELS = {
  all:         "全部",
  wild_taiwan: "🌿 野外台灣",
  captive:     "🏠 人工飼養",
  larva:       "🐛 幼期紀錄",
  other:       "💬 其他",
};

// ── Family groups (toggle) ──
function buildFilterLists() {
  // Category list
  const catCounts = getCategoryCounts();
  const catEl = document.getElementById("cat-list");
  catEl.innerHTML = Object.entries(CAT_LABELS).map(([key, label]) => {
    const n = catCounts[key] || 0;
    if (key !== "all" && n === 0) return "";
    return `<li data-cat="${key}" class="${key==="all"?"active":""}" onclick="selectCat('${key}')">
      <span>${label}</span><span class="count">${n}</span>
    </li>`;
  }).join("");

  buildFamilyGroups();
}

function buildFamilyGroups() {
  // Compute species counts in current category filter
  const filtered = activeCategory === "all"
    ? POSTS
    : POSTS.filter(p => (p.category || "other") === activeCategory);

  const speciesCounts = {};
  for (const p of filtered) {
    if (!p.species) continue;
    speciesCounts[p.species] = (speciesCounts[p.species] || 0) + 1;
  }

  // Group by family
  const familyMap = {};
  for (const [sp, cnt] of Object.entries(speciesCounts)) {
    const fam = speciesFamily(sp);
    if (!familyMap[fam]) familyMap[fam] = [];
    familyMap[fam].push({ sp, cnt });
  }

  // Sort species within each family by count
  for (const fam of Object.keys(familyMap)) {
    familyMap[fam].sort((a, b) => b.cnt - a.cnt);
  }

  // Sort families by total count
  const sortedFamilies = Object.entries(familyMap)
    .sort((a, b) => b[1].reduce((s, x) => s + x.cnt, 0) - a[1].reduce((s, x) => s + x.cnt, 0));

  const container = document.getElementById("family-groups");
  container.innerHTML = sortedFamilies.map(([fam, items]) => {
    const total = items.reduce((s, x) => s + x.cnt, 0);
    const hasActive = items.some(x => x.sp === activeSpecies) || fam === activeFamily;
    const isOpen = hasActive || (sortedFamilies.length <= 3);
    return `<div class="family-group ${isOpen ? 'open' : ''}" data-fam="${esc(fam)}">
      <div class="family-header ${hasActive ? 'has-active' : ''}" onclick="toggleFamily(this)">
        <span>${fam}</span>
        <span class="family-count">${total}</span>
        <span class="family-arrow">▶</span>
      </div>
      <div class="family-body">
        ${items.map(({ sp, cnt }) => `
          <div class="species-item ${sp === activeSpecies ? 'active' : ''}"
               data-species="${esc(sp)}"
               onclick="selectSpecies('${esc(sp)}')">
            <span>${sp}</span><span class="count">${cnt}</span>
          </div>`).join("")}
      </div>
    </div>`;
  }).join("");
}

function esc(s) { return s.replace(/'/g, "\'").replace(/"/g, "&quot;"); }

function toggleFamily(header) {
  const group = header.parentElement;
  const fam = group.dataset.fam;
  const nowOpen = group.classList.toggle("open");
  // 點科別：展開的同時，右側顯示整科所有紀錄；收合則清除該科篩選
  if (nowOpen) {
    activeFamily = fam;
    activeSpecies = null;
  } else if (activeFamily === fam) {
    activeFamily = null;
  }
  document.querySelectorAll(".family-header").forEach(h =>
    h.classList.toggle("has-active", h.parentElement.dataset.fam === activeFamily));
  document.querySelectorAll(".species-item").forEach(el => el.classList.remove("active"));
  renderGrid();
}

function speciesFamily(sp) {
  const FAMILY_KEYWORDS = {"食蚜蠅科 Syrphidae": ["食蚜蠅", "蚜蠅", "Episyrphus", "Eristalis", "Eristalinus", "Ischiodon", "Syrphus", "Allograpta", "Melanostoma", "Sphaerophoria", "Asarkina", "Phytomia", "Mesembrius", "Volucella", "Betasyrphus", "Paragus", "Meliscaeva", "Baccha", "Eupeodes", "Dideoides"], "實蠅科 Tephritidae": ["果實蠅", "實蠅", "Bactrocera", "Zeugodacus", "Dacus"], "果蠅科 Drosophilidae": ["果蠅", "Drosophila"], "麗蠅科 Calliphoridae": ["麗蠅", "Chrysomya", "Lucilia", "Calliphora"], "肉蠅科 Sarcophagidae": ["肉蠅", "Sarcophaga"], "寄蠅科 Tachinidae": ["寄蠅", "Tachina", "Exorista"], "家蠅科 Muscidae": ["家蠅", "Musca"], "花蠅科 Anthomyiidae": ["花蠅", "Anthomyia"], "廁蠅科 Fanniidae": ["廁蠅", "Fannia"], "水蠅科 Ephydridae": ["水蠅", "Ephydra"], "沼蠅科 Sciomyzidae": ["沼蠅", "Sepedon"], "潛蠅科 Agromyzidae": ["潛蠅", "Liriomyza"], "蚤蠅科 Phoridae": ["蚤蠅", "Megaselia"], "突眼蠅科 Diopsidae": ["突眼蠅", "眼蠅", "Teleopsis", "Cyrtodiopsis", "Sphyracephala"], "頭蠅科 Pipunculidae": ["頭蠅", "Pipunculus"], "頸喙蠅科 Conopidae": ["頸喙蠅", "彎頸蠅", "Physocephala", "Conops"], "長腳蠅科 Dolichopodidae": ["長腳蠅", "長足虻", "Dolichopus", "Condylostylus"], "縞蠅科 Lauxaniidae": ["縞蠅", "Homoneura", "Minettia", "Sapromyza", "Neogriphoneura"], "廣口蠅科 Platystomatidae": ["廣口蠅", "Rivellia", "Xenaspis", "Euprosopia", "Plagiostenopterina"], "稈蠅科 Chloropidae": ["稈蠅", "桿蠅", "Chlorops"], "鎧蠅科 Celyphidae": ["鎧蠅", "Celyphus"], "糞蠅科 Scathophagidae": ["糞蠅", "Scathophaga"], "蹺腳蠅科 Micropezidae": ["微腳蠅", "蹺腳蠅", "Mimegralla", "Micropezidae"], "長頭蠅科 Strongylophthalmyiidae": ["折翅蠅", "Strongylophthalmyia"], "狂蠅科 Oestridae": ["狂蠅", "Oestridae", "Oestroidea"], "食蟲虻科 Asilidae": ["食蟲虻", "盜虻", "Promachus", "Ommatius", "Laphria", "Cophinopoda", "Michotamia", "Astochia"], "蜂虻科 Bombyliidae": ["姬蜂虻", "蜂虻", "Systropus", "Ligyra", "Exhyalanthrax", "Anthrax"], "水虻科 Stratiomyidae": ["水虻", "Hermetia", "Ptecticus", "黑水虻", "Odontomyia"], "舞虻科 Empididae": ["舞虻", "Empis", "Hilara"], "劍虻科 Therevidae": ["劍虻", "Thereva"], "網翅虻科 Nemestrinidae": ["網翅虻", "Nemestrinidae", "Trichophthalma", "Hirmoneura"], "蠓科 Ceratopogonidae": ["蠓", "Culicoides", "Forcipomyia"], "虻科 Tabanidae": ["牛虻", "Tabanus", "Chrysops", "虻"], "擬大蚊科 Limoniidae": ["擬大蚊"], "大蚊科 Tipulidae": ["大蚊", "Tipula", "Nephrotoma"], "搖蚊科 Chironomidae": ["搖蚊", "Chironomus"], "眼蕈蚊科 Sciaridae": ["眼蕈蚊"], "蕈蚊科 Mycetophilidae": ["蕈蚊"], "毛蚊科 Bibionidae": ["毛蚊", "Bibio", "Plecia"], "癭蚋科 Cecidomyiidae": ["癭蚋"], "蛾蚋科 Psychodidae": ["蛾蚋", "Psychoda"], "蚋科 Simuliidae": ["蚋", "Simulium"], "蚊科 Culicidae": ["蚊", "孑孓", "Aedes", "Culex", "Anopheles"], "幼蟲": ["幼蟲", "蛆", "孑孓", "larva", "幼期"]};
  for (const [fam, kws] of Object.entries(FAMILY_KEYWORDS)) {
    for (const kw of kws) {
      if (sp.toLowerCase().includes(kw.toLowerCase())) return fam;
    }
  }
  return "其他";
}

// ── Filtering ──
function selectCat(cat) {
  activeCategory = cat;
  activeSpecies = null;
  activeFamily = null;
  document.querySelectorAll(".cat-list li").forEach(el => {
    el.classList.toggle("active", el.dataset.cat === cat);
  });
  buildFamilyGroups();
  renderGrid();
}

function selectSpecies(sp) {
  if (activeSpecies === sp) {
    activeSpecies = null;
  } else {
    activeSpecies = sp;
    activeFamily = null;   // 選單一物種時解除整科篩選
  }
  buildFamilyGroups();
  renderGrid();
}

function filterPosts() {
  return POSTS.filter(p => {
    if (activeCategory !== "all" && (p.category || "other") !== activeCategory) return false;
    if (activeFamily && speciesFamily(p.species || "") !== activeFamily) return false;
    if (activeSpecies && p.species !== activeSpecies) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const hay = [p.species, p.scientific, p.location, p.text, p.author].join(" ").toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function renderGrid() {
  const posts = filterPosts();
  const grid = document.getElementById("grid");
  document.getElementById("empty").style.display = posts.length ? "none" : "block";

  grid.innerHTML = posts.map((p, idx) => {
    const realIdx = POSTS.indexOf(p);
    const imgEl = p.images && p.images.length
      ? `<img class="card-img" src="images/${p.images[0]}" alt="" loading="lazy" onerror="this.style.display='none'">`
      : `<div class="card-no-img">🦟</div>`;
    const ts = p.timestamp ? p.timestamp.slice(0, 10) : "";
    const fam = speciesFamily(p.species || "");
    return `<div class="card" onclick="openModal(${realIdx})">
      ${imgEl}
      <div class="card-body">
        <div class="card-species">${p.species || "（物種未知）"}</div>
        ${p.scientific ? `<div class="card-scientific">${p.scientific}</div>` : ''}
        <div class="card-family">${fam !== "其他" ? fam.split(" ")[0] : ""}</div>
        ${p.location ? `<div class="card-location">${p.location}</div>` : ""}
        <div class="card-text">${p.text || ""}</div>
        <div class="card-meta">
          <span>${p.author || ""}</span>
          <span>${ts}</span>
        </div>
      </div>
    </div>`;
  }).join("");
}

function openModal(idx) {
  const p = POSTS[idx];
  document.getElementById("modal-species").textContent = p.species || "（物種未知）";
  const sciEl = document.getElementById("modal-scientific");
  sciEl.textContent = p.scientific || "";
  sciEl.style.display = p.scientific ? "block" : "none";
  document.getElementById("modal-meta").innerHTML = [
    p.location ? `📍 ${p.location}` : "",
    p.author   ? `👤 ${p.author}`   : "",
    p.timestamp ? `🗓 ${p.timestamp.slice(0,10)}` : "",
  ].filter(Boolean).join(" &nbsp;·&nbsp; ");
  document.getElementById("modal-text").textContent = p.text || "";
  const link = document.getElementById("modal-link");
  link.href = p.post_url || "#";
  link.style.display = p.post_url ? "inline-block" : "none";
  const imgs = document.getElementById("modal-imgs");
  imgs.innerHTML = (p.images || []).map(fn =>
    `<img src="images/${fn}" alt="">`
  ).join("");
  imgs.style.display = (p.images || []).length ? "flex" : "none";
  document.getElementById("modal-overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal(e) {
  if (e && e.target !== document.getElementById("modal-overlay") && e.target.id !== "modal-close") return;
  document.getElementById("modal-overlay").classList.remove("open");
  document.body.style.overflow = "";
}
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

document.getElementById("search").addEventListener("input", e => {
  searchQuery = e.target.value;
  renderGrid();
});

buildFilterLists();
renderGrid();
</script>
</body>
</html>
