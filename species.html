<title>台灣雙翅目物種圖鑑</title>
<style>
  :root {
    --bg: #f3f7fa;
    --card-bg: #fff;
    --accent: #2f6f8f;
    --accent-light: #e6f0f5;
    --accent2: #1f4f66;
    --text: #1a2e38;
    --muted: #5a7686;
    --border: #c5d7e0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system,"Noto Sans TC",sans-serif; background:var(--bg); color:var(--text); }

  header {
    background:var(--accent); color:white;
    padding:1rem 1.5rem; display:flex; align-items:center; gap:1rem;
    position:sticky; top:0; z-index:100;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
  }
  header h1 { font-size:1.15rem; font-weight:700; }
  header .subtitle { font-size:.78rem; opacity:.85; }
  .header-nav { margin-left:auto; display:flex; gap:.6rem; }
  .header-nav a {
    color:rgba(255,255,255,.8); text-decoration:none;
    font-size:.82rem; padding:.2rem .65rem;
    border-radius:999px; border:1px solid rgba(255,255,255,.35);
    transition:background .15s;
  }
  .header-nav a:hover,.header-nav a.active { background:rgba(255,255,255,.2); color:white; }

  .layout { display:flex; }
  aside {
    width:210px; min-width:210px;
    background:var(--card-bg); border-right:1px solid var(--border);
    padding:1rem .8rem;
    height:calc(100vh - 58px); overflow-y:auto;
    position:sticky; top:58px;
  }
  aside h2 { font-size:.7rem; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); margin-bottom:.5rem; }
  .sp-nav-list { list-style:none; }
  .sp-nav-list li a {
    display:flex; justify-content:space-between; align-items:center;
    padding:.3rem .5rem; border-radius:6px;
    text-decoration:none; color:var(--text); font-size:.82rem;
    transition:background .12s;
  }
  .sp-nav-list li a:hover { background:var(--accent-light); }
  .sp-nav-list li a.active { background:var(--accent); color:white; }
  .sp-nav-list .cnt {
    font-size:.7rem; background:rgba(0,0,0,.08);
    border-radius:999px; padding:.03rem .38rem;
  }
  .sp-nav-list li a.active .cnt { background:rgba(255,255,255,.25); }
  .family-label {
    font-size:.72rem; color:var(--accent2); font-weight:700;
    margin:.8rem 0 .2rem .3rem; letter-spacing:.03em;
    cursor:pointer; padding:.28rem .4rem; border-radius:6px;
    border-left:3px solid transparent; transition:background .12s;
  }
  .family-label:hover { background:var(--accent-light); border-left-color:var(--accent); }
  .family-label.active { background:var(--accent); color:#fff; border-left-color:var(--accent2); }

  main { flex:1; padding:1.2rem; overflow-y:auto; }
  #fam-filter-bar {
    display:flex; align-items:center; gap:.6rem; flex-wrap:wrap;
    background:var(--accent-light); border:1px solid var(--border);
    border-radius:10px; padding:.5rem .8rem; margin-bottom:1rem;
    font-size:.9rem; color:var(--accent2);
  }
  #fam-filter-bar b { font-size:1rem; }
  #fam-filter-bar button {
    margin-left:auto; background:var(--accent); color:#fff; border:none;
    border-radius:6px; padding:.35rem .7rem; cursor:pointer; font-size:.85rem;
  }
  #fam-filter-bar button:hover { background:var(--accent2); }

  .sp-section {
    background:var(--card-bg); border-radius:12px;
    border:1px solid var(--border); margin-bottom:2rem;
    overflow:hidden; scroll-margin-top:70px;
  }
  .sp-header {
    padding:1.1rem 1.3rem; border-bottom:1px solid var(--border);
    display:flex; gap:1rem; align-items:flex-start;
  }
  .sp-name { font-size:1.4rem; font-weight:700; color:var(--accent2); }
  .sp-latin { font-size:.88rem; color:var(--muted); font-style:italic; margin-top:.15rem; }
  .sp-badges { display:flex; gap:.45rem; margin-top:.5rem; flex-wrap:wrap; }
  .badge {
    display:inline-block; padding:.13rem .5rem;
    border-radius:999px; font-size:.7rem;
    background:var(--accent-light); color:var(--accent2);
    border:1px solid #b2dfcf;
  }
  .sp-count-badge { margin-left:auto; text-align:right; white-space:nowrap; font-size:.82rem; color:var(--muted); }
  .sp-count-badge strong { display:block; font-size:1.7rem; color:var(--accent); }

  .sp-gallery { display:flex; gap:3px; overflow-x:auto; background:#111; max-height:260px; }
  .sp-gallery img { height:240px; width:auto; object-fit:cover; flex-shrink:0; cursor:pointer; }
  .no-photo { display:flex; align-items:center; justify-content:center; height:120px; background:var(--accent-light); font-size:2.5rem; }

  .sp-body { padding:1.1rem 1.3rem; display:flex; flex-direction:column; gap:1.3rem; }
  .sp-section-label {
    font-size:.68rem; text-transform:uppercase; letter-spacing:.06em;
    color:var(--muted); margin-bottom:.5rem; font-weight:700;
  }

  .my-note {
    width:100%; min-height:80px; padding:.65rem .9rem;
    border:1.5px solid var(--border); border-radius:8px;
    font-family:inherit; font-size:.88rem; line-height:1.7;
    color:var(--text); background:#fafcfa; resize:vertical;
    transition:border-color .15s;
  }
  .my-note:focus { outline:none; border-color:var(--accent); background:white; }
  .my-note::placeholder { color:#b0c4b8; }

  .expert-notes-list { display:flex; flex-direction:column; gap:.45rem; }
  .expert-note-item {
    padding:.55rem .9rem; border-radius:8px;
    background:#fff8e1; border-left:3px solid #f6a11a;
    font-size:.83rem; line-height:1.65; color:var(--text);
  }
  .expert-sources {
    margin-top:.25rem; font-size:.72rem; color:#b07800; font-style:italic;
  }
  .expert-sources::before { content:"來源："; }

  .notes-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:.5rem; }
  .note-item {
    padding:.55rem .8rem; border-radius:8px;
    background:var(--accent-light); border-left:3px solid var(--accent);
    font-size:.83rem; line-height:1.65; color:var(--text);
  }
  .no-notes { font-size:.83rem; color:var(--muted); font-style:italic; }

  .loc-tags { display:flex; flex-wrap:wrap; gap:.35rem; }
  .loc-tag {
    display:inline-flex; align-items:center; gap:.22rem;
    padding:.2rem .6rem; background:white; border:1px solid var(--border);
    border-radius:999px; font-size:.78rem; color:var(--text);
  }
  .loc-tag::before { content:"📍"; font-size:.7rem; }

  .records-row { display:flex; gap:.45rem; overflow-x:auto; padding-bottom:.4rem; }
  .records-row::-webkit-scrollbar { height:4px; }
  .records-row::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  .rec-mini {
    min-width:110px; max-width:110px; flex-shrink:0;
    border:1px solid var(--border); border-radius:8px;
    overflow:hidden; background:white;
    text-decoration:none; color:var(--text); display:block;
    transition:box-shadow .12s, transform .12s;
  }
  .rec-mini:hover { box-shadow:0 3px 10px rgba(0,0,0,.13); transform:translateY(-1px); }
  .rec-mini img { width:100%; height:72px; object-fit:cover; display:block; }
  .rec-mini-noimg { width:100%; height:72px; background:var(--accent-light); display:flex; align-items:center; justify-content:center; font-size:1.4rem; }
  .rec-mini-body { padding:.35rem .42rem; font-size:.69rem; color:var(--muted); }
  .rec-mini-body strong { display:block; color:var(--text); margin-bottom:.08rem; font-size:.73rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  #lb { display:none; position:fixed; inset:0; background:rgba(0,0,0,.87); z-index:500; justify-content:center; align-items:center; }
  #lb.open { display:flex; }
  #lb img { max-width:92vw; max-height:90vh; border-radius:6px; object-fit:contain; }
  #lb-close { position:fixed; top:1rem; right:1.2rem; color:white; font-size:2rem; cursor:pointer; }

  .save-btn {
    background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.5);
    color:white; padding:.22rem .7rem; border-radius:999px;
    font-size:.8rem; cursor:pointer; transition:background .15s;
  }
  .save-btn:hover { background:rgba(255,255,255,.3); }
  .save-toast {
    position:fixed; bottom:1.2rem; right:1.2rem;
    background:#1a5c3f; color:white; padding:.55rem 1rem;
    border-radius:8px; font-size:.83rem; display:none;
    box-shadow:0 3px 10px rgba(0,0,0,.2); z-index:999;
  }
</style>
</head>

const SAVED_NOTES = {};

function buildNav() {
  const nav = document.getElementById("sp-nav");
  let lastFamily = "";
  // build map of common→count to detect duplicates
  const commonCount = {};
  SPECIES.forEach(sp => { if (sp.common) commonCount[sp.common] = (commonCount[sp.common]||0)+1; });

  SPECIES.forEach((sp, i) => {
    if (sp.family !== lastFamily) {
      const li = document.createElement("li");
      const fam = sp.family || "其他";
      const fl = document.createElement("div");
      fl.className = "family-label";
      fl.dataset.family = fam;
      fl.innerHTML = `${escHtml(fam)} <span class="fam-cnt"></span>`;
      fl.addEventListener("click", () => filterFamily(fam));
      li.appendChild(fl);
      nav.appendChild(li);
      lastFamily = sp.family;
    }
    const li = document.createElement("li");
    // if common name is shared by multiple entries, show key (scientific) instead
    const isDup = sp.common && commonCount[sp.common] > 1;
    const navLabel = isDup ? (sp.key) : (sp.common || sp.key);
    li.innerHTML = `<a href="#sp-${i}">${escHtml(navLabel)} <span class="cnt">${sp.count}</span></a>`;
    nav.appendChild(li);
  });
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const id = e.target.id;
        document.querySelectorAll(".sp-nav-list a").forEach(a => {
          a.classList.toggle("active", a.getAttribute("href") === "#" + id);
        });
      }
    });
  }, { threshold: 0.25 });
  document.querySelectorAll(".sp-section").forEach(s => observer.observe(s));
}

let curFamFilter = null;
function filterFamily(fam) {
  if (curFamFilter === fam) { clearFamilyFilter(); return; }
  curFamFilter = fam;
  document.querySelectorAll(".sp-section").forEach(s => {
    s.style.display = (s.dataset.family === fam) ? "" : "none";
  });
  document.querySelectorAll(".family-label").forEach(l =>
    l.classList.toggle("active", l.dataset.family === fam));
  const bar = document.getElementById("fam-filter-bar");
  document.getElementById("fam-filter-name").textContent = fam;
  bar.style.display = "flex";
  window.scrollTo({ top: 0, behavior: "smooth" });
}
function clearFamilyFilter() {
  curFamFilter = null;
  document.querySelectorAll(".sp-section").forEach(s => s.style.display = "");
  document.querySelectorAll(".family-label").forEach(l => l.classList.remove("active"));
  document.getElementById("fam-filter-bar").style.display = "none";
}

function buildSections() {
  const main = document.getElementById("main-content");
  main.innerHTML = SPECIES.map((sp, i) => {
    const displayName = sp.common || sp.key;
    const latin = sp.scientific && sp.scientific !== sp.key ? sp.scientific : "";

    const gallery = sp.photos.length
      ? sp.photos.map(fn => `<img src="images/${fn}" onclick="openLb(this.src)" alt="${escHtml(displayName)}">`).join("")
      : `<div class="no-photo">🦗</div>`;

    const notesHtml = sp.notes.length
      ? `<div class="notes-grid">${sp.notes.map(n => `<div class="note-item">${escHtml(n)}</div>`).join("")}</div>`
      : `<p class="no-notes">尚無識別筆記</p>`;

    const locsHtml = sp.locations.length
      ? sp.locations.map(l => `<span class="loc-tag">${escHtml(l)}</span>`).join("")
      : `<span class="no-notes">—</span>`;

    const recsHtml = sp.records.map(r => {
      const imgPart = r.img
        ? `<img src="images/${r.img}" alt="" onerror="this.parentNode.innerHTML='<div class=rec-mini-noimg>🦗</div>'">`
        : `<div class="rec-mini-noimg">🦗</div>`;
      return `<a class="rec-mini" href="${r.post_url}" target="_blank">
        ${imgPart}
        <div class="rec-mini-body">
          <strong>${escHtml(r.author)}</strong>
          ${escHtml((r.text_preview || "").slice(0, 35))}
        </div>
      </a>`;
    }).join("");

    return `
    <section class="sp-section" id="sp-${i}" data-family="${escHtml(sp.family || "其他")}">
      <div class="sp-header">
        <div>
          <div class="sp-name">${escHtml(displayName)}</div>
          ${latin ? `<div class="sp-latin">${escHtml(latin)}</div>` : ""}
          <div class="sp-badges">
            ${sp.family ? `<span class="badge">${escHtml(sp.family)}</span>` : ""}
          </div>
        </div>
        <div class="sp-count-badge">
          <strong>${sp.count}</strong>筆紀錄
        </div>
      </div>

      <div class="sp-gallery">${gallery}</div>

      <div class="sp-body">
        <div>
          <div class="sp-section-label">✏️ 我的筆記</div>
          <textarea class="my-note" data-sp="${escHtml(sp.key)}"
            placeholder="輸入觀察筆記、導覽解說重點、識別要點…（自動存入瀏覽器）"></textarea>
        </div>

        ${sp.expert_notes && sp.expert_notes.length ? `
        <div>
          <div class="sp-section-label">🎯 專家辨識要點</div>
          <div class="expert-notes-list">
            ${sp.expert_notes.map(n => `<div class="expert-note-item">
              ${escHtml(n)}
              ${sp.expert_sources && sp.expert_sources.length ? `<div class="expert-sources">${escHtml(sp.expert_sources.join('、'))}</div>` : ''}
            </div>`).join('')}
          </div>
        </div>` : ''}

        ${sp.notes.length ? `
        <div>
          <div class="sp-section-label">🔍 識別特徵筆記</div>
          ${notesHtml}
        </div>` : ""}

        ${sp.locations.length ? `
        <div>
          <div class="sp-section-label">📍 常見觀察地點</div>
          <div class="loc-tags">${locsHtml}</div>
        </div>` : ""}

        ${sp.records.length ? `
        <div>
          <div class="sp-section-label">📋 觀察紀錄</div>
          <div class="records-row">${recsHtml}</div>
        </div>` : ""}
      </div>
    </section>`;
  }).join("");

  document.querySelectorAll(".my-note").forEach(ta => {
    const key = "mynote:" + ta.dataset.sp;
    ta.value = localStorage.getItem(key) ?? SAVED_NOTES[ta.dataset.sp] ?? "";
    ta.addEventListener("input", () => localStorage.setItem(key, ta.value));
  });
}

function exportNotes() {
  const notes = {};
  document.querySelectorAll(".my-note").forEach(ta => {
    if (ta.value.trim()) notes[ta.dataset.sp] = ta.value;
  });
  const blob = new Blob([JSON.stringify(notes, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "species_notes.json";
  a.click();
  const t = document.getElementById("toast");
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 4000);
}

function escHtml(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function openLb(src) {
  document.getElementById("lb-img").src = src;
  document.getElementById("lb").classList.add("open");
}
function closeLb() { document.getElementById("lb").classList.remove("open"); }
document.addEventListener("keydown", e => { if (e.key==="Escape") closeLb(); });

buildSections();
buildNav();
</script>
