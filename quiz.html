<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>雙翅目物種辨識測驗</title>
<style>
  :root{--bg:#f3f7fa;--card:#fff;--accent:#2f6f8f;--al:#e6f0f5;--a2:#1f4f66;--tx:#1a2e38;--mu:#5a7686;--bd:#c5d7e0;--ok:#2e7d32;--ng:#c62828;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,"Noto Sans TC",sans-serif;background:var(--bg);color:var(--tx);}
  header{background:var(--accent);color:#fff;padding:.75rem 1.3rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2);}
  header h1{font-size:1.1rem;font-weight:700;}
  header .sub{font-size:.78rem;opacity:.85;}
  .nav{margin-left:auto;display:flex;gap:.55rem;}
  .nav a{color:rgba(255,255,255,.82);text-decoration:none;font-size:.82rem;padding:.22rem .62rem;border-radius:999px;border:1px solid rgba(255,255,255,.35);}
  .nav a:hover,.nav a.active{background:rgba(255,255,255,.2);color:#fff;}

  .quiz-wrap{max-width:640px;margin:1.5rem auto;padding:0 1rem 3rem;}

  .score-bar{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:.65rem 1rem;display:flex;align-items:center;gap:1rem;margin-bottom:1.1rem;font-size:.88rem;}
  .s-num{font-weight:700;font-size:1.1rem;color:var(--a2);}
  .s-mu{color:var(--mu);}
  .streak{color:#e65100;font-weight:600;}
  .reset-btn{margin-left:auto;background:none;border:1px solid var(--bd);border-radius:8px;padding:.25rem .7rem;cursor:pointer;font-size:.78rem;color:var(--mu);}
  .reset-btn:hover{background:var(--al);}

  .q-card{background:var(--card);border-radius:14px;border:1px solid var(--bd);overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.07);}
  .q-img-wrap{background:#111;display:flex;align-items:center;justify-content:center;min-height:300px;max-height:420px;overflow:hidden;cursor:zoom-in;position:relative;}
  .q-img-wrap img{width:100%;max-height:420px;object-fit:contain;display:block;}
  .q-num{position:absolute;top:.7rem;left:.7rem;background:rgba(0,0,0,.55);color:#fff;font-size:.75rem;padding:.17rem .6rem;border-radius:999px;}
  .zoom-hint{position:absolute;bottom:.6rem;right:.7rem;background:rgba(0,0,0,.45);color:rgba(255,255,255,.85);font-size:.7rem;padding:.13rem .5rem;border-radius:999px;pointer-events:none;}

  .q-body{padding:1.2rem;}
  .q-prompt{font-size:1rem;font-weight:600;margin-bottom:.95rem;}
  .choices{display:grid;grid-template-columns:1fr 1fr;gap:.55rem;}
  .choice{padding:.7rem .9rem;border:2px solid var(--bd);border-radius:10px;background:#fff;color:var(--tx);font-size:.9rem;font-family:inherit;cursor:pointer;text-align:left;transition:border-color .12s,background .12s,transform .1s;line-height:1.4;}
  .choice:hover:not(:disabled){border-color:var(--accent);background:var(--al);transform:translateY(-1px);}
  .choice:disabled{cursor:default;}
  .choice.correct{border-color:var(--ok);background:#e8f5e9;color:var(--ok);font-weight:600;}
  .choice.wrong{border-color:var(--ng);background:#ffebee;color:var(--ng);}
  .choice.dimmed{opacity:.42;}

  .result{margin-top:1rem;padding:.9rem 1rem;border-radius:10px;display:none;animation:fi .22s ease;}
  .result.show{display:block;}
  @keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
  .verdict{font-size:1rem;font-weight:700;margin-bottom:.65rem;}
  .verdict.ok{color:var(--ok);}
  .verdict.ng{color:var(--ng);}
  .evidence-box{background:var(--al);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:.55rem .8rem;margin-bottom:.65rem;font-size:.82rem;line-height:1.65;color:var(--tx);}
  .evidence-box strong{color:var(--a2);}
  .sci-note{font-size:.78rem;color:var(--mu);font-style:italic;margin-bottom:.55rem;}
  .result-actions{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:.75rem;}
  .btn-post{display:inline-flex;align-items:center;gap:.3rem;padding:.45rem .9rem;border-radius:8px;background:#fff;border:1.5px solid var(--bd);color:var(--tx);text-decoration:none;font-size:.83rem;transition:border-color .12s,background .12s;}
  .btn-post:hover{border-color:var(--accent);background:var(--al);}
  .btn-next{flex:1;padding:.5rem 1.2rem;border-radius:8px;background:var(--accent);color:#fff;border:none;font-size:.9rem;font-family:inherit;cursor:pointer;font-weight:600;transition:background .12s,transform .1s;}
  .btn-next:hover{background:var(--a2);transform:translateY(-1px);}

  #lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:500;justify-content:center;align-items:center;cursor:zoom-out;}
  #lb.open{display:flex;}
  #lb img{max-width:95vw;max-height:93vh;object-fit:contain;border-radius:6px;}
  #lb-x{position:fixed;top:1rem;right:1.2rem;color:#fff;font-size:2rem;cursor:pointer;line-height:1;}

  /* ── 出題類群勾選面板 ── */
  .filter-panel{background:var(--card);border:1px solid var(--bd);border-radius:10px;margin-bottom:1.1rem;overflow:hidden;}
  .filter-head{display:flex;align-items:center;gap:.5rem;padding:.65rem 1rem;cursor:pointer;user-select:none;font-size:.9rem;font-weight:600;color:var(--a2);}
  .filter-head .fp-arrow{transition:transform .2s;font-size:.7rem;color:var(--mu);}
  .filter-panel.collapsed .fp-arrow{transform:rotate(-90deg);}
  .filter-head .fp-count{margin-left:auto;font-size:.78rem;font-weight:400;color:var(--mu);}
  .filter-body{padding:.2rem 1rem 1rem;border-top:1px solid var(--bd);}
  .filter-panel.collapsed .filter-body{display:none;}
  .fp-actions{display:flex;gap:.5rem;margin:.75rem 0 .85rem;}
  .fp-actions button{background:none;border:1px solid var(--bd);border-radius:7px;padding:.32rem .75rem;font-size:.78rem;color:var(--mu);cursor:pointer;font-family:inherit;}
  .fp-actions button:hover{background:var(--al);border-color:var(--accent);color:var(--a2);}
  .fam-chips{display:flex;flex-wrap:wrap;gap:.5rem;}
  .fam-chip{display:inline-flex;align-items:center;gap:.4rem;padding:.42rem .72rem;border:1.5px solid var(--bd);border-radius:999px;font-size:.83rem;cursor:pointer;user-select:none;transition:border-color .12s,background .12s;}
  .fam-chip .fc-box{width:16px;height:16px;border:1.5px solid var(--mu);border-radius:4px;display:inline-flex;align-items:center;justify-content:center;font-size:.7rem;color:#fff;flex-shrink:0;line-height:1;}
  .fam-chip.on{border-color:var(--accent);background:var(--al);color:var(--a2);font-weight:600;}
  .fam-chip.on .fc-box{background:var(--accent);border-color:var(--accent);}
  .fam-chip .fc-cnt{font-size:.72rem;color:var(--mu);}
  .fam-chip.on .fc-cnt{color:var(--a2);}
  .fp-warn{color:var(--ng);font-size:.8rem;margin-top:.7rem;display:none;}

  @media(max-width:640px){
    header{flex-wrap:wrap;padding:.55rem .9rem;gap:.45rem;}
    header h1{font-size:1rem;} header .sub{font-size:.72rem;}
    .nav{margin-left:0;width:100%;gap:.35rem;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:.1rem;}
    .nav a{font-size:.76rem;padding:.2rem .55rem;white-space:nowrap;}
    .quiz-wrap{margin:1rem auto;padding:0 .8rem 2.5rem;}
  }
  @media(max-width:480px){.choices{grid-template-columns:1fr;}.q-img-wrap{min-height:220px;}}
</style>
</head>

    </div>
    <div class="q-body">
      <div class="q-prompt">這是哪一種雙翅目昆蟲？</div>
      <div class="choices" id="choices"></div>
      <div class="result" id="result">
        <div class="verdict" id="verdict"></div>
        <div id="sci-note" class="sci-note"></div>
        <div id="evidence-box" class="evidence-box" style="display:none"></div>
        <div class="result-actions">
          <a class="btn-post" id="btn-post" href="#" target="_blank">📋 原貼文</a>
          <button class="btn-next" onclick="nextQ()">下一題 →</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="lb" onclick="closeLb()">
  <span id="lb-x" onclick="closeLb()">✕</span>
  <img id="lb-img" src="" alt="">
</div>

const ALL_SP = ["亮大蚊", "四斑柄眼蠅", "大蚊", "孟蠅", "家蠅", "家蠅(蛹)", "家鴿蝨蠅", "寄蠅", "實蠅", "小麗水虻", "平大蚊", "廣口蠅", "搖蚊", "擬食蟲虻", "普西黑翅實蠅", "東方果實蠅", "果實蠅", "毛蚊", "水虻", "水蠅", "瘧蚊", "癭蚋", "白線斑蚊", "白腹叢蚊", "窄翅實蠅", "糞蠅", "縞蠅", "腹帶實蠅", "虻", "蚊", "蚋", "蚤蠅", "蛾蚋", "蜂虻", "蠓", "謝氏歐塔實蠅", "酷肖蚜蠅", "長痣實蠅", "長腳瘦蠅", "長足虻", "陽蠅", "食蚜蠅", "食蟲虻", "駝舞虻", "鷸虻", "麗蠅"];

let pool=[], cur=null, qn=0, ok=0, tot=0, streak=0, answered=false;
let activeItems=ITEMS;
let activeSpecies=ALL_SP;   // 干擾選項候選池（跟出題類群連動）

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

// ── 出題類群勾選 ──
const FAM_KEY="quiz_fam_filter_v1";
function famList(){
  const cnt={};
  ITEMS.forEach(it=>{const f=it.family||"其他";cnt[f]=(cnt[f]||0)+1;});
  return Object.entries(cnt).sort((a,b)=>b[1]-a[1]);
}
function loadFamSel(){
  try{const s=JSON.parse(localStorage.getItem(FAM_KEY));if(Array.isArray(s)&&s.length)return new Set(s);}catch(e){}
  return new Set(famList().map(x=>x[0]));
}
let famSel=loadFamSel();
function computeActiveSpecies(){return ALL_SP.filter(s=>famSel.has(FAMILY_MAP[s]||"其他"));}
function toggleFilter(){document.getElementById("filter-panel").classList.toggle("collapsed");}
function buildFamChips(){
  document.getElementById("fam-chips").innerHTML=famList().map(([f,c])=>{
    const on=famSel.has(f);
    return `<label class="fam-chip ${on?'on':''}" onclick="toggleFam('${esc(f)}',event)">`
      +`<span class="fc-box">${on?'✓':''}</span>${esc(f)} <span class="fc-cnt">${c}</span></label>`;
  }).join("");
  const nf=famSel.size, all=famList().length;
  const total=ITEMS.filter(it=>famSel.has(it.family||"其他")).length;
  document.getElementById("fp-count").textContent=
    nf>=all?`全部 ${all} 類群 · ${total} 題`:`已選 ${nf}/${all} 類群 · ${total} 題`;
}
function toggleFam(f,ev){ev.preventDefault();if(famSel.has(f))famSel.delete(f);else famSel.add(f);applyFam();}
function selectAllFam(on){famSel=on?new Set(famList().map(x=>x[0])):new Set();applyFam();}
function applyFam(){
  const warn=document.getElementById("fp-warn");
  if(famSel.size===0){warn.style.display="block";buildFamChips();return;}
  warn.style.display="none";
  localStorage.setItem(FAM_KEY,JSON.stringify([...famSel]));
  buildFamChips();
  activeItems=ITEMS.filter(it=>famSel.has(it.family||"其他"));
  activeSpecies=computeActiveSpecies();
  resetQuiz();
}

function distractors(sp, fam, n) {
  const src = (activeSpecies && activeSpecies.length) ? activeSpecies : ALL_SP;
  const sameFam = src.filter(s => s !== sp && FAMILY_MAP[s] === fam && fam);
  const other   = src.filter(s => s !== sp && !(FAMILY_MAP[s] === fam && fam));
  return shuffle([...sameFam, ...other]).slice(0, n);
}
const FAMILY_MAP = {"亮大蚊": "大蚊科 Tipulidae", "四斑柄眼蠅": "突眼蠅科 Diopsidae", "大蚊": "大蚊科 Tipulidae", "孟蠅": "", "家蠅": "家蠅科 Muscidae", "家蠅(蛹)": "家蠅科 Muscidae", "家鴿蝨蠅": "", "寄蠅": "寄蠅科 Tachinidae", "實蠅": "實蠅科 Tephritidae", "小麗水虻": "水虻科 Stratiomyidae", "平大蚊": "大蚊科 Tipulidae", "廣口蠅": "廣口蠅科 Platystomatidae", "搖蚊": "搖蚊科 Chironomidae", "擬食蟲虻": "食蟲虻科 Asilidae", "普西黑翅實蠅": "實蠅科 Tephritidae", "東方果實蠅": "實蠅科 Tephritidae", "果實蠅": "實蠅科 Tephritidae", "毛蚊": "毛蚊科 Bibionidae", "水虻": "水虻科 Stratiomyidae", "水蠅": "水蠅科 Ephydridae", "瘧蚊": "蚊科 Culicidae", "癭蚋": "癭蚋科 Cecidomyiidae", "白線斑蚊": "蚊科 Culicidae", "白腹叢蚊": "蚊科 Culicidae", "窄翅實蠅": "實蠅科 Tephritidae", "糞蠅": "糞蠅科 Scathophagidae", "縞蠅": "縞蠅科 Lauxaniidae", "腹帶實蠅": "實蠅科 Tephritidae", "虻": "虻科 Tabanidae", "蚊": "蚊科 Culicidae", "蚋": "蚋科 Simuliidae", "蚤蠅": "蚤蠅科 Phoridae", "蛾蚋": "蛾蚋科 Psychodidae", "蜂虻": "蜂虻科 Bombyliidae", "蠓": "蠓科 Ceratopogonidae", "謝氏歐塔實蠅": "實蠅科 Tephritidae", "酷肖蚜蠅": "食蚜蠅科 Syrphidae", "長痣實蠅": "實蠅科 Tephritidae", "長腳瘦蠅": "", "長足虻": "長腳蠅科 Dolichopodidae", "陽蠅": "", "食蚜蠅": "食蚜蠅科 Syrphidae", "食蟲虻": "食蟲虻科 Asilidae", "駝舞虻": "舞虻科 Empididae", "鷸虻": "虻科 Tabanidae", "麗蠅": "麗蠅科 Calliphoridae"};

function resetQuiz(){if(!activeItems.length)activeItems=ITEMS;pool=shuffle([...activeItems]);ok=0;tot=0;streak=0;qn=0;upd();nextQ();}

function nextQ(){
  if(!pool.length) pool=shuffle([...activeItems]);
  cur=pool.pop(); qn++;
  answered=false;
  document.getElementById("q-img").src="images/"+cur.image;
  document.getElementById("lb-img").src="images/"+cur.image;
  document.getElementById("q-num").textContent="#"+qn;
  document.getElementById("result").classList.remove("show");
  const ds=distractors(cur.species, cur.family, 3);
  const cs=shuffle([cur.species,...ds]);
  document.getElementById("choices").innerHTML=cs.map(s=>
    `<button class="choice" onclick="answer('${esc(s)}')">${esc(s)}</button>`
  ).join("");
}

function answer(chosen){
  if(answered)return;
  answered=true; tot++;
  const right=chosen===cur.species;
  if(right){ok++;streak++;}else{streak=0;}
  upd();
  document.querySelectorAll(".choice").forEach(b=>{
    b.disabled=true;
    const t=b.textContent.trim();
    if(t===cur.species)b.classList.add("correct");
    else if(t===chosen&&!right)b.classList.add("wrong");
    else b.classList.add("dimmed");
  });
  const v=document.getElementById("verdict");
  v.className="verdict "+(right?"ok":"ng");
  v.innerHTML=right?`✅ 答對了！是<strong>${esc(cur.species)}</strong>`:`❌ 答錯了，正解是<strong>${esc(cur.species)}</strong>`;
  const sn=document.getElementById("sci-note");
  sn.textContent=cur.scientific?`學名：${cur.scientific}`:"";
  const eb=document.getElementById("evidence-box");
  if(cur.evidence){eb.innerHTML=`<strong>辨識依據：</strong>${esc(cur.evidence)}`;eb.style.display="block";}
  else{eb.style.display="none";}
  document.getElementById("btn-post").href=cur.post_url||"#";
  document.getElementById("result").classList.add("show");
}

function upd(){
  document.getElementById("s-ok").textContent=ok;
  document.getElementById("s-tot").textContent=tot;
  const s=document.getElementById("streak");
  s.textContent=streak>=3?`🔥 連對${streak}題！`:streak>=2?`連對${streak}題`:"";
}

function openLb(){document.getElementById("lb-img").src="images/"+cur.image;document.getElementById("lb").classList.add("open");}
function closeLb(){document.getElementById("lb").classList.remove("open");}
document.addEventListener("keydown",e=>{
  if(e.key==="Escape")closeLb();
  if((e.key==="Enter"||e.key===" ")&&answered)nextQ();
});
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/'/g,"&#39;");}

buildFamChips();
activeItems=ITEMS.filter(it=>famSel.has(it.family||"其他"));
activeSpecies=computeActiveSpecies();
resetQuiz();
</script>
